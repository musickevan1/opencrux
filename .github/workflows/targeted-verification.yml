name: Targeted Verification

on:
  pull_request:
  push:

jobs:
  targeted-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up browser binaries
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Expose browser binaries on PATH
        run: |
          mkdir -p "$HOME/.local/bin"
          ln -sf "${{ steps.setup-chrome.outputs.chrome-path }}" "$HOME/.local/bin/google-chrome"
          ln -sf "${{ steps.setup-chrome.outputs.chromedriver-path }}" "$HOME/.local/bin/chromedriver"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install OpenCrux and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run targeted verification wrapper
        run: ./scripts/run_targeted_verification.sh