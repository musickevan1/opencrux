<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenCrux — Theme Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #0a0e17; color: #f8fafc; min-height: 100vh; }

    .gallery-header { padding: 2rem 1.5rem 1rem; max-width: 1400px; margin: 0 auto; }
    .gallery-header h1 {
      font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 700;
      background: linear-gradient(135deg, #ff5722, #ff9800, #ff5722);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .gallery-header p { color: #94a3b8; margin-top: 0.5rem; font-size: 1.05rem; }
    .gallery-header .hint {
      display: inline-block; margin-top: 0.75rem; padding: 6px 14px;
      background: rgba(255, 87, 34, 0.12); border: 1px solid rgba(255, 87, 34, 0.25);
      border-radius: 999px; font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; color: #ff7043;
    }

    .dev-bar {
      position: sticky; top: 0; z-index: 1000;
      background: rgba(10, 14, 23, 0.92); backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding: 0.75rem 1.5rem; display: flex; gap: 0.5rem;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .theme-btn {
      flex-shrink: 0; padding: 10px 18px; border-radius: 10px;
      border: 2px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.04);
      color: #94a3b8; font-family: 'IBM Plex Mono', monospace; font-size: 0.82rem;
      cursor: pointer; transition: all 150ms ease; white-space: nowrap;
    }
    .theme-btn:hover { border-color: rgba(255, 87, 34, 0.4); color: #f8fafc; background: rgba(255, 87, 34, 0.08); }
    .theme-btn.active { border-color: #ff5722; color: #ff5722; background: rgba(255, 87, 34, 0.12); box-shadow: 0 0 20px rgba(255, 87, 34, 0.15); }
    .theme-btn .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }

    .view-toggle { display: flex; gap: 0.5rem; padding: 0.75rem 1.5rem 0; max-width: 1400px; margin: 0 auto; }
    .view-btn {
      padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04); color: #64748b;
      font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; cursor: pointer; transition: all 150ms ease;
    }
    .view-btn.active { border-color: rgba(255, 255, 255, 0.2); color: #f8fafc; background: rgba(255, 255, 255, 0.08); }

    .grid-view {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 1.5rem; padding: 1.5rem; max-width: 1400px; margin: 0 auto;
    }
    .theme-card {
      border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03); overflow: hidden;
      transition: all 200ms ease; cursor: pointer;
    }
    .theme-card:hover { border-color: rgba(255, 87, 34, 0.3); transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); }
    .theme-card.active { border-color: #ff5722; box-shadow: 0 0 30px rgba(255, 87, 34, 0.15); }
    .theme-card iframe { width: 100%; height: 260px; border: none; pointer-events: none; }
    .theme-card-info { padding: 1rem 1.25rem; display: flex; justify-content: space-between; align-items: center; }
    .theme-card-info h3 { font-size: 1rem; font-weight: 600; }
    .theme-card-desc { padding: 0 1.25rem 1rem; color: #64748b; font-size: 0.88rem; line-height: 1.5; }

    .full-view { display: none; width: 100%; max-width: 1400px; margin: 1.5rem auto; padding: 0 1.5rem; }
    .full-view.visible { display: block; }
    .full-view-frame { width: 100%; height: calc(100vh - 140px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; overflow: hidden; transition: max-width 300ms ease; }
    .full-view-frame iframe { width: 100%; height: 100%; border: none; }
    .full-view-controls { display: flex; gap: 0.75rem; margin-bottom: 1rem; align-items: center; flex-wrap: wrap; }
    .viewport-btn {
      padding: 8px 14px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04); color: #94a3b8;
      font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; cursor: pointer; transition: all 150ms ease;
    }
    .viewport-btn.active { border-color: #ff5722; color: #ff5722; background: rgba(255, 87, 34, 0.08); }
    .open-tab-btn {
      margin-left: auto; padding: 8px 16px; border-radius: 8px; border: 1px solid #ff5722;
      background: rgba(255, 87, 34, 0.1); color: #ff5722;
      font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; cursor: pointer; transition: all 150ms ease; text-decoration: none;
    }
    .open-tab-btn:hover { background: #ff5722; color: #fff; }

    @media (max-width: 640px) {
      .grid-view { grid-template-columns: 1fr; }
      .gallery-header { padding: 1.5rem 1rem 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="gallery-header">
    <h1>OpenCrux Themes</h1>
    <p>Dev gallery — pick a direction for the real app</p>
    <span class="hint">tap a card to preview full-screen &middot; use viewport buttons to test responsive</span>
  </div>

  <nav class="dev-bar" id="dev-bar"></nav>

  <div class="view-toggle">
    <button class="view-btn active" data-view="grid">Grid</button>
    <button class="view-btn" data-view="full">Full Preview</button>
  </div>

  <div class="grid-view" id="grid-view"></div>

  <div class="full-view" id="full-view">
    <div class="full-view-controls">
      <button class="viewport-btn active" data-width="100%">Desktop</button>
      <button class="viewport-btn" data-width="768px">Tablet</button>
      <button class="viewport-btn" data-width="375px">Mobile</button>
      <a class="open-tab-btn" id="open-tab-link" href="#" target="_blank">Open in new tab</a>
    </div>
    <div class="full-view-frame" id="full-view-frame">
      <iframe id="full-iframe" src=""></iframe>
    </div>
  </div>

  <script>
    // Change this to match your deployed app URL
    const APP_URL = '/';

    const themes = [
      { id: 'dark-neon', name: 'Dark Neon', color: '#ff5722', desc: 'Full dark mode, electric orange glows, glass morphism. Mission control meets climbing gym at night.' },
      { id: 'warm-earth', name: 'Warm Earth', color: '#e8722a', desc: 'Charcoal + sandstone, serif headings, topographic textures. Climbing guidebook at basecamp.' },
      { id: 'split-contrast', name: 'Split Contrast', color: '#06b6d4', desc: 'Light top, dark analysis cave. Dramatic diagonal transition \u2014 entering the rock.' },
      { id: 'retro-arcade', name: 'Retro Arcade', color: '#ff2d95', desc: 'Pixel fonts, CRT scanlines, coin-slot upload, HIGH SCORE metrics, HALL OF FAME.' },
      { id: 'adventure-mag', name: 'Adventure Mag', color: '#0d4f4f', desc: 'Bold editorial magazine layout. Bebas Neue type, teal + coral, SUBMIT YOUR SEND.' },
      { id: 'playful-3d', name: 'Playful 3D', color: '#7c3aed', desc: 'Floating holds, 3D tilt cards, rope connectors, boulder drop zone. Maximum whimsy.' },
      { id: 'skate-punk', name: 'Skate Punk', color: '#ff1493', desc: 'Sticker-bomb on kraft paper. YEET YOUR BETA, hand-drawn fonts, emoji chaos.' },
    ];

    let activeTheme = themes[0].id;
    const devBar = document.getElementById('dev-bar');
    const gridView = document.getElementById('grid-view');
    const fullView = document.getElementById('full-view');
    const fullIframe = document.getElementById('full-iframe');
    const fullViewFrame = document.getElementById('full-view-frame');
    const openTabLink = document.getElementById('open-tab-link');

    // Build dev bar
    themes.forEach(function(t) {
      const btn = document.createElement('button');
      btn.className = 'theme-btn' + (t.id === activeTheme ? ' active' : '');
      btn.dataset.theme = t.id;
      const dot = document.createElement('span');
      dot.className = 'dot';
      dot.style.background = t.color;
      btn.appendChild(dot);
      btn.appendChild(document.createTextNode(t.name));
      btn.addEventListener('click', function() { selectTheme(t.id); });
      devBar.appendChild(btn);
    });

    // Build grid cards — each card links to the real app with ?theme= param
    themes.forEach(function(t) {
      const card = document.createElement('a');
      card.className = 'theme-card' + (t.id === activeTheme ? ' active' : '');
      card.dataset.theme = t.id;
      card.href = APP_URL + '?theme=' + t.id;
      card.target = '_blank';
      card.style.textDecoration = 'none';
      card.style.color = 'inherit';
      card.style.display = 'block';

      const info = document.createElement('div');
      info.className = 'theme-card-info';
      const h3 = document.createElement('h3');
      h3.textContent = t.name;
      info.appendChild(h3);
      const badge = document.createElement('span');
      badge.className = 'badge';
      badge.style.cssText = 'padding:4px 10px;border-radius:999px;font-family:IBM Plex Mono,monospace;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.06em;background:' + t.color + '22;color:' + t.color + ';border:1px solid ' + t.color + '44';
      badge.textContent = 'live theme';
      info.appendChild(badge);
      card.appendChild(info);

      const desc = document.createElement('div');
      desc.className = 'theme-card-desc';
      desc.textContent = t.desc;
      card.appendChild(desc);

      card.addEventListener('click', function(e) {
        e.preventDefault();
        selectTheme(t.id);
        switchView('full');
      });
      gridView.appendChild(card);
    });

    // View toggle
    document.querySelectorAll('.view-btn').forEach(function(btn) {
      btn.addEventListener('click', function() { switchView(btn.dataset.view); });
    });

    // Viewport buttons
    document.querySelectorAll('.viewport-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.viewport-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        var w = btn.dataset.width;
        fullViewFrame.style.maxWidth = w;
        fullViewFrame.style.margin = w === '100%' ? '0' : '0 auto';
      });
    });

    function selectTheme(id) {
      activeTheme = id;
      var theme = themes.find(function(t) { return t.id === id; });
      document.querySelectorAll('.theme-btn').forEach(function(btn) { btn.classList.toggle('active', btn.dataset.theme === id); });
      document.querySelectorAll('.theme-card').forEach(function(card) { card.classList.toggle('active', card.dataset.theme === id); });
      fullIframe.src = APP_URL + '?theme=' + id;
      openTabLink.href = APP_URL + '?theme=' + id;
    }

    function switchView(view) {
      document.querySelectorAll('.view-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.view === view); });
      if (view === 'grid') {
        gridView.style.display = '';
        fullView.classList.remove('visible');
      } else {
        gridView.style.display = 'none';
        fullView.classList.add('visible');
        var theme = themes.find(function(t) { return t.id === activeTheme; });
        fullIframe.src = APP_URL + '?theme=' + theme.id;
        openTabLink.href = APP_URL + '?theme=' + theme.id;
      }
    }

    // Initialize full view iframe
    fullIframe.src = APP_URL + '?theme=' + activeTheme;
    openTabLink.href = APP_URL + '?theme=' + activeTheme;
  </script>
</body>
</html>
